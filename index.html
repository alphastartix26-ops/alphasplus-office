<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ALPHA S+ AI 사무실</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b0c10">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="S+ 사무실">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<style>
  :root{
    --bg:#0b0c10; --panel:#14161d; --panel2:#1b1e27; --line:#272b36;
    --gold:#e8b94b; --silver:#cbd2dc; --txt:#eaf0f6; --dim:#8b93a3;
    --green:#3ad07a; --blue:#4d8dff; --red:#ff5656;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI','Malgun Gothic',sans-serif;background:
    radial-gradient(1200px 600px at 70% -10%, #1a1d27 0%, var(--bg) 60%);
    color:var(--txt);min-height:100vh;padding:28px}
  .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
  .brand{font-size:26px;font-weight:800;letter-spacing:.5px}
  .brand b{color:var(--gold)}
  .clock{color:var(--dim);font-size:14px;text-align:right}
  .clock .on{color:var(--green);font-weight:700}
  .grid{display:grid;grid-template-columns:1fr 360px;gap:22px;align-items:start}
  @media(max-width:900px){.grid{grid-template-columns:1fr}}
  .section-title{font-size:13px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin:0 0 14px 4px}
  /* office floor */
  .floor{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px}
  .desk{background:linear-gradient(180deg,var(--panel) 0%,var(--panel2) 100%);
    border:1px solid var(--line);border-radius:18px;padding:20px;cursor:pointer;
    position:relative;transition:.18s;overflow:hidden}
  .desk:hover{transform:translateY(-3px);border-color:var(--gold);box-shadow:0 10px 30px #0008}
  .desk .badge{position:absolute;top:14px;right:14px;font-size:11px;font-weight:700;
    padding:5px 11px;border-radius:20px}
  .b-wait{background:#2a2f3a;color:var(--silver)}
  .b-work{background:rgba(77,141,255,.18);color:var(--blue);border:1px solid #4d8dff55}
  .b-review{background:rgba(232,185,75,.18);color:var(--gold);border:1px solid #e8b94b55}
  .ava{font-size:54px;line-height:1;filter:drop-shadow(0 4px 10px #0007)}
  .work .ava{animation:bob 1.6s ease-in-out infinite}
  @keyframes bob{50%{transform:translateY(-5px)}}
  .nm{font-size:20px;font-weight:800;margin-top:10px}
  .role{color:var(--gold);font-size:13px;font-weight:700;margin-top:2px}
  .cur{margin-top:14px;font-size:13px;color:var(--silver);min-height:18px}
  .cur b{color:var(--txt)}
  .bar{height:8px;background:#0c0e14;border-radius:8px;margin-top:8px;overflow:hidden;border:1px solid #00000055}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),#ffd778);
    border-radius:8px;transition:width .5s;box-shadow:0 0 10px #e8b94b88}
  .stats{display:flex;gap:14px;margin-top:14px;font-size:12px;color:var(--dim)}
  .stats b{color:var(--txt);font-size:15px;display:block}
  .hire{display:flex;align-items:center;justify-content:center;flex-direction:column;
    border:1.5px dashed var(--line);color:var(--dim);min-height:210px;border-radius:18px;
    cursor:pointer;transition:.18s}
  .hire:hover{border-color:var(--gold);color:var(--gold)}
  .hire .plus{font-size:38px}
  /* side */
  .side{display:flex;flex-direction:column;gap:18px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:18px}
  .log{max-height:340px;overflow:auto}
  .log .row{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid #20242e;font-size:13px}
  .log .row:last-child{border:0}
  .log .t{color:var(--dim);font-size:11px;white-space:nowrap}
  .log .m{color:var(--silver)}
  .tk{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #20242e}
  .tk:last-child{border:0}
  .dot{width:9px;height:9px;border-radius:50%;flex:none}
  .d-done{background:var(--green)} .d-work{background:var(--blue)} .d-wait{background:var(--silver)}
  .tk .tt{flex:1;font-size:14px}
  .tk .ch{font-size:11px;color:var(--dim)}
  /* modal */
  .ov{position:fixed;inset:0;background:#000a;display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
  .ov.on{display:flex}
  .modal{background:linear-gradient(180deg,var(--panel) 0,var(--panel2) 100%);border:1px solid var(--gold);
    border-radius:22px;max-width:520px;width:100%;padding:26px;box-shadow:0 20px 60px #000b}
  .modal h2{font-size:24px;display:flex;align-items:center;gap:12px}
  .modal .role2{color:var(--gold);font-size:13px;font-weight:700;margin:2px 0 16px}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}
  .chip{background:#222733;border:1px solid var(--line);color:var(--silver);font-size:12px;padding:6px 12px;border-radius:20px}
  .lbl{font-size:12px;color:var(--dim);letter-spacing:1px;margin:16px 0 8px}
  textarea{width:100%;background:#0c0e14;border:1px solid var(--line);border-radius:12px;color:var(--txt);
    padding:12px;font-size:14px;font-family:inherit;resize:vertical;min-height:72px}
  .btn{background:linear-gradient(90deg,var(--gold),#ffd778);color:#1a1407;font-weight:800;border:0;
    padding:12px 18px;border-radius:12px;cursor:pointer;font-size:14px;width:100%;margin-top:10px}
  .btn.sec{background:#222733;color:var(--silver);font-weight:600}
  .x{position:absolute;top:18px;right:22px;color:var(--dim);cursor:pointer;font-size:22px}
  .auto{display:flex;align-items:center;justify-content:space-between;background:#0c0e14;border:1px solid var(--line);
    border-radius:12px;padding:11px 14px;margin-top:8px;font-size:13px}
  .toggle{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px}
  .on2{background:rgba(58,208,122,.18);color:var(--green)} .off2{background:#2a2f3a;color:var(--dim)}
  .hint{font-size:11px;color:var(--dim);margin-top:8px;line-height:1.5}
</style>
</head>
<body>
  <div id="gate" style="position:fixed;inset:0;background:radial-gradient(800px 400px at 50% 30%,#1a1d27,#0b0c10 70%);display:flex;align-items:center;justify-content:center;z-index:100;flex-direction:column;gap:16px">
    <div style="font-size:30px;font-weight:800">🔒 ALPHA <span style="color:#e8b94b">S+</span> AI 사무실</div>
    <div style="color:#8b93a3;font-size:13px">비밀번호를 입력하세요</div>
    <input id="pw" type="password" placeholder="비밀번호" onkeydown="if(event.key==='Enter')auth()"
      style="background:#14161d;border:1px solid #272b36;border-radius:12px;color:#fff;padding:13px 18px;font-size:16px;text-align:center;width:240px">
    <button onclick="auth()" style="background:linear-gradient(90deg,#e8b94b,#ffd778);color:#1a1407;font-weight:800;border:0;padding:12px 34px;border-radius:12px;cursor:pointer;font-size:15px">입장</button>
    <div id="pwerr" style="color:#ff5656;font-size:12px;height:14px"></div>
  </div>
  <div class="top">
    <div class="brand">🏢 ALPHA <b>S+</b> AI 사무실</div>
    <div class="clock"><div id="date">—</div><div><span class="on" id="oncount">●</span> <span id="onmsg"></span></div></div>
  </div>

  <div class="grid">
    <div>
      <div class="section-title">사무실 · 직원</div>
      <div class="floor" id="floor"></div>
    </div>
    <div class="side">
      <div class="card">
        <div class="section-title" style="margin-bottom:10px">진행 업무</div>
        <div id="tasks"></div>
      </div>
      <div class="card">
        <div class="section-title" style="margin-bottom:10px">활동 로그</div>
        <div class="log" id="log"></div>
      </div>
    </div>
  </div>

  <!-- 직원 모달 -->
  <div class="ov" id="ov" onclick="if(event.target===this)close_()">
    <div class="modal" id="modal"></div>
  </div>

<script>
// 서버 없이 파일로 직접 열 때(file://)를 위한 내장 데이터(폴백).
const INITIAL_STATE = {
  "company":"ALPHA S+ AI 사무실","updatedAt":"2026-06-01 20:10",
  "employees":[{"id":"reel-pd","name":"릴이","role":"릴스 PD","avatar":"🎬","desk":"A-1","hiredAt":"2026-06-01","skill":"reel","status":"대기중","mood":"🙂","currentTask":null,"progress":0,"step":null,
    "autoTasks":[{"title":"급등/급락주 뉴스 모니터링","schedule":"매일 09:00","enabled":false}],
    "stats":{"제작완료":1,"게시완료":1,"총재생":0},
    "skills":["차트 방향 판독","뉴스·공시 조사","보조지표 분석","4채널 게시","썸네일 고정"]}],
  "tasks":[{"id":"t-prfx","employee":"reel-pd","title":"PRFX 급등 릴스","status":"완료","progress":100,
    "channels":{"youtube":"done","facebook":"done","instagram":"done","naver":"done"},
    "note":"딥솔라 AI + 엔비디아 급등 / ADX·MACD 컨플루언스","updatedAt":"2026-06-01"}],
  "activityLog":[{"time":"2026-06-01 20:05","who":"릴이","msg":"PRFX 4채널 게시 완료 🎉"},
    {"time":"2026-06-01 19:40","who":"릴이","msg":"보조지표 한 화면 순차 설명(ADX→MACD) 적용"},
    {"time":"2026-06-01 18:30","who":"릴이","msg":"PRFX 급등 뉴스 조사·검증 완료"}]
};
let STATE=null, openId=null;

async function load(){
  try{
    const r=await fetch('state.json?ts='+Date.now());
    if(!r.ok) throw 0;
    STATE=await r.json();
  }catch(e){
    STATE = INITIAL_STATE; // 서버 없이 file://로 열린 경우
  }
  render();
  if(openId) openEmp(openId);
}
const stCls={"대기중":"b-wait","작업중":"b-work","검수대기":"b-review"};
const stWork=s=>s==="작업중";

function render(){
  document.getElementById('date').textContent=STATE.updatedAt;
  const on=STATE.employees.filter(e=>e.status!=="대기중").length;
  document.getElementById('onmsg').textContent=`직원 ${STATE.employees.length}명 · 작업중 ${on}명`;

  // floor
  let h="";
  for(const e of STATE.employees){
    const work=stWork(e.status);
    h+=`<div class="desk ${work?'work':''}" onclick="openEmp('${e.id}')">
      <span class="badge ${stCls[e.status]||'b-wait'}">${e.status}</span>
      <div class="ava">${e.avatar} <span style="font-size:20px">${e.mood||''}</span></div>
      <div class="nm">${e.name}</div>
      <div class="role">${e.role}</div>
      <div class="cur">${e.currentTask?('🛠️ <b>'+e.currentTask+'</b>'+(e.step?' · '+e.step:'')):'<span style=\"color:#8b93a3\">대기 중 — 클릭해서 업무 지시</span>'}</div>
      ${e.currentTask?`<div class="bar"><i style="width:${e.progress||0}%"></i></div>`:''}
      <div class="stats">
        <div><b>${e.stats?.제작완료??0}</b>제작</div>
        <div><b>${e.stats?.게시완료??0}</b>게시</div>
      </div>
    </div>`;
  }
  h+=`<div class="hire" onclick="hire()"><div class="plus">＋</div><div>직원 채용</div></div>`;
  document.getElementById('floor').innerHTML=h;

  // tasks
  const dcls={"완료":"d-done","진행중":"d-work","대기":"d-wait"};
  document.getElementById('tasks').innerHTML = STATE.tasks.length? STATE.tasks.map(t=>{
    const chs=Object.entries(t.channels||{}).map(([k,v])=>`${v==='done'?'✅':'·'}${k}`).join(' ');
    return `<div class="tk"><span class="dot ${dcls[t.status]||'d-wait'}"></span>
      <div class="tt">${t.title}<div class="ch">${chs}</div></div>
      <b style="color:var(--gold)">${t.progress}%</b></div>`;
  }).join('') : '<div class="hint">진행 중인 업무 없음</div>';

  // log
  document.getElementById('log').innerHTML = (STATE.activityLog||[]).map(l=>
    `<div class="row"><span class="t">${l.time.split(' ')[1]||l.time}</span><span class="m"><b style="color:var(--gold)">${l.who}</b> ${l.msg}</span></div>`
  ).join('');
}

function openEmp(id){
  openId=id;
  const e=STATE.employees.find(x=>x.id===id); if(!e)return;
  const auto=(e.autoTasks||[]).map(a=>`<div class="auto"><span>⏰ ${a.title} <span style="color:#8b93a3">(${a.schedule})</span></span>
    <span class="toggle ${a.enabled?'on2':'off2'}">${a.enabled?'자동 ON':'OFF'}</span></div>`).join('')||'<div class="hint">등록된 자동 업무 없음</div>';
  document.getElementById('modal').innerHTML=`
    <span class="x" onclick="close_()">✕</span>
    <h2>${e.avatar} ${e.name}</h2>
    <div class="role2">${e.role} · 자리 ${e.desk} · 입사 ${e.hiredAt}</div>
    <div class="cur">${e.currentTask?('지금: 🛠️ <b>'+e.currentTask+'</b> ('+(e.progress||0)+'%)'+(e.step?'<br><span style=\"color:#8b93a3\">'+e.step+'</span>':'')):'지금: 대기 중'}</div>
    <div class="lbl">보유 능력</div>
    <div class="chips">${(e.skills||[]).map(s=>`<span class="chip">${s}</span>`).join('')}</div>
    <div class="lbl">자동 업무</div>
    ${auto}
    <div class="lbl">오늘 업무 지시</div>
    <textarea id="ord" placeholder="예: 이 종목 차트 2장 줄게 릴스 만들어줘 / TSLA 급등 분석해줘"></textarea>
    <button class="btn" onclick="order('${e.name}')">📋 지시문 복사</button>
    <button class="btn sec" onclick="close_()">닫기</button>
    <div class="hint">복사한 지시문을 Claude Code 채팅에 붙여넣으면 ${e.name}가 업무를 시작합니다.<br>(차트 이미지는 채팅에 함께 올려주세요)</div>`;
  document.getElementById('ov').classList.add('on');
}
function close_(){openId=null;document.getElementById('ov').classList.remove('on');}
function order(name){
  const v=document.getElementById('ord').value.trim();
  const msg=`[${name}에게 업무 지시] ${v||'(내용을 입력하세요)'}`;
  navigator.clipboard.writeText(msg).then(()=>{
    const b=event.target;b.textContent='✅ 복사됨! 채팅에 붙여넣기';setTimeout(()=>b.textContent='📋 지시문 복사',1800);
  });
}
function hire(){
  alert('새 직원 채용은 Claude에게 말해주세요!\n예) "캡션 작가 직원 한 명 더 만들어줘"');
}

// ── 비밀번호 잠금 (가벼운 보호) ──
const PW_HASH="8316695b9ebb1aae9960d1f261bd3009348705c8cb93761206fec89708a4d8a7";
async function sha256(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
  return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');}
async function auth(){
  const v=document.getElementById('pw').value;
  if(await sha256(v)===PW_HASH){sessionStorage.setItem('office_auth','1');enter();}
  else{document.getElementById('pwerr').textContent='비밀번호가 틀렸습니다';}
}
function enter(){document.getElementById('gate').style.display='none';load();setInterval(load,3000);}
if(sessionStorage.getItem('office_auth')==='1'){enter();}
else{setTimeout(()=>document.getElementById('pw')?.focus(),100);}

// PWA 서비스워커 등록 (설치형 앱)
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
</body>
</html>
